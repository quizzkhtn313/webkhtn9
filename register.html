<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Đăng ký Vũ Trụ - Quiz 9A Cosmic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0a0c1a, #020105);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      color: #f0f3ff;
    }

    /* ===== VŨ TRỤ NỀN SAO ĐỘNG ===== */
    .cosmic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* Lớp sao tĩnh + nhấp nháy */
    .stars-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 15% 30%, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 72% 18%, #ffe6b3, rgba(0,0,0,0)),
        radial-gradient(3px 2px at 94% 68%, #ffd9b0, rgba(0,0,0,0)),
        radial-gradient(2px 1px at 28% 85%, #c2e0ff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 44% 12%, #f8f0e3, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 5% 55%, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 88% 41%, #fff, rgba(0,0,0,0)),
        radial-gradient(3px 2px at 64% 73%, #ffe3b5, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 35% 94%, #b3e4ff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50% 50%, #ffefcf, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 77% 33%, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 12% 67%, #ffe0b7, rgba(0,0,0,0)),
        radial-gradient(2px 1px at 54% 91%, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 93% 9%, #ffcf9a, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40% 22%, #ffffff, rgba(0,0,0,0));
      background-repeat: no-repeat;
      background-size: 250px 250px, 300px 300px, 400px 400px, 350px 350px, 280px 280px, 500px 500px, 200px 200px, 380px 380px, 310px 310px, 450px 450px, 220px 220px, 360px 360px, 410px 410px, 270px 270px, 600px 600px;
      opacity: 0.9;
      animation: starTwinkle 4s infinite alternate;
    }

    /* Sao lớn mờ + tinh vân */
    .nebula-mist {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 70%, rgba(147, 51, 234, 0.15), transparent 60%),
                  radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.12), transparent 70%),
                  radial-gradient(circle at 40% 40%, rgba(59, 130, 246, 0.08), transparent 80%);
      filter: blur(45px);
      animation: nebulaDrift 18s infinite alternate ease-in-out;
    }

    /* Sao băng */
    .shooting-star {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 4px;
      height: 4px;
      background: linear-gradient(135deg, rgba(255,255,245,1), rgba(255,200,100,0));
      border-radius: 50%;
      filter: blur(1px);
      box-shadow: 0 0 12px 2px rgba(255,210,90,0.8);
      animation: meteor 9s linear infinite;
      z-index: 1;
    }
    .shooting-star:nth-child(2) {
      top: 15%;
      left: 70%;
      animation-delay: 4s;
      animation-duration: 12s;
      width: 3px;
      height: 3px;
    }
    .shooting-star:nth-child(3) {
      top: 60%;
      left: 20%;
      animation-delay: 7s;
      animation-duration: 10s;
      width: 5px;
      height: 5px;
    }
    .shooting-star:nth-child(4) {
      top: 85%;
      left: 90%;
      animation-delay: 2s;
      animation-duration: 14s;
    }

    @keyframes starTwinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    @keyframes nebulaDrift {
      0% { transform: translate(0%, 0%) scale(1); opacity: 0.6; }
      100% { transform: translate(3%, 2%) scale(1.08); opacity: 0.9; }
    }
    @keyframes meteor {
      0% { transform: translate(0, 0) rotate(25deg); opacity: 1; }
      8% { opacity: 1; }
      20% { transform: translate(25vw, 15vh) rotate(25deg); opacity: 0; }
      100% { transform: translate(45vw, 35vh) rotate(25deg); opacity: 0; }
    }

    /* ===== CARD CHÍNH - GLASS COSMIC ===== */
    .register-container {
      position: relative;
      z-index: 20;
      max-width: 520px;
      width: 100%;
      background: rgba(8, 12, 28, 0.55);
      backdrop-filter: blur(14px);
      border-radius: 48px;
      border: 1px solid rgba(147, 51, 234, 0.5);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(236, 72, 153, 0.2) inset, 0 0 30px rgba(147, 51, 234, 0.3);
      transition: all 0.3s ease;
      overflow: hidden;
      animation: floatIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(35px) scale(0.96); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Header vũ trụ */
    .register-header {
      background: linear-gradient(125deg, rgba(79, 40, 131, 0.85), rgba(139, 33, 105, 0.8), rgba(20, 60, 150, 0.7));
      padding: 36px 24px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    .register-header::before {
      content: "✨🚀✨";
      position: absolute;
      font-size: 90px;
      bottom: -15px;
      right: -20px;
      opacity: 0.1;
      pointer-events: none;
      font-family: monospace;
      transform: rotate(-8deg);
    }
    .register-header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, #c084fc, #f0a6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px rgba(192, 132, 252, 0.6);
    }
    .register-header p {
      font-size: 1rem;
      letter-spacing: 1px;
      margin-top: 8px;
      font-weight: 300;
      backdrop-filter: blur(2px);
    }

    /* Role Tabs - thiết kế viền plasma */
    .role-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(255,255,240,0.1);
    }
    .role-tab {
      flex: 1;
      padding: 16px 12px;
      text-align: center;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      background: transparent;
      transition: all 0.25s ease;
      color: #ccd6f6;
      border-bottom: 3px solid transparent;
      letter-spacing: 0.5px;
      backdrop-filter: blur(2px);
    }
    .role-tab i {
      margin-right: 8px;
      font-size: 1.2rem;
    }
    .role-tab.active {
      background: rgba(147, 51, 234, 0.2);
      color: white;
      border-bottom: 3px solid #c084fc;
      text-shadow: 0 0 6px #c084fc;
      box-shadow: 0 -2px 8px rgba(192,132,252,0.2);
    }
    .role-tab:not(.active):hover {
      background: rgba(255,255,255,0.05);
      color: #e9d5ff;
      border-bottom: 3px solid rgba(192,132,252,0.5);
    }

    /* body form */
    .register-body {
      padding: 40px 32px 48px;
    }

    /* Input groups - hi-tech glowing */
    .input-group {
      position: relative;
      margin-bottom: 26px;
    }
    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #a78bfa;
      font-size: 1.2rem;
      transition: 0.2s;
      text-shadow: 0 0 3px #8b5cf6;
      z-index: 2;
    }
    .input-group input {
      width: 100%;
      padding: 16px 18px 16px 52px;
      background: rgba(15, 20, 35, 0.65);
      border: 1.5px solid rgba(167, 139, 250, 0.5);
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      color: #f0f3ff;
      font-family: 'Inter', monospace;
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
      letter-spacing: 0.3px;
    }
    .input-group input:focus {
      outline: none;
      border-color: #c084fc;
      box-shadow: 0 0 0 4px rgba(147, 51, 234, 0.3), 0 0 15px rgba(192, 132, 252, 0.5);
      background: rgba(8, 12, 30, 0.85);
    }
    .input-group input::placeholder {
      color: #b9c3e6;
      font-weight: 400;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    /* teacher code group special */
    #teacherCodeGroup {
      transition: all 0.3s;
    }

    /* Nút đăng ký vũ trụ */
    .register-btn {
      width: 100%;
      padding: 16px 12px;
      background: linear-gradient(95deg, #0f2b4d, #7e22ce, #ec4899);
      background-size: 200% auto;
      border: none;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'Orbitron', monospace;
      color: white;
      letter-spacing: 1.5px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 8px rgba(236, 72, 153, 0.4);
      position: relative;
      overflow: hidden;
    }
    .register-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .register-btn:hover::before {
      left: 100%;
    }
    .register-btn:hover {
      background-position: right center;
      transform: scale(1.02);
      box-shadow: 0 8px 28px rgba(126, 34, 206, 0.6), 0 0 20px #ec4899;
      border: 1px solid rgba(255, 255, 200, 0.5);
    }

    /* Alert cosmic style */
    .alert {
      padding: 14px 18px;
      margin-bottom: 24px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.7);
      border-left: 5px solid;
      display: none;
    }
    .alert.error {
      background: rgba(220, 38, 38, 0.2);
      border-left-color: #ef4444;
      color: #ffe0e0;
      box-shadow: 0 0 8px #ef4444;
    }
    .alert.success {
      background: rgba(16, 185, 129, 0.2);
      border-left-color: #10b981;
      color: #ccf7e5;
      box-shadow: 0 0 8px #10b981;
    }

    /* Links vũ trụ */
    .links {
      margin-top: 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .back-link, .login-link {
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .back-link {
      color: #b9c7f0;
      background: rgba(255,255,245,0.05);
      padding: 6px 16px;
      border-radius: 40px;
      width: fit-content;
      margin: 0 auto;
    }
    .back-link:hover {
      color: white;
      background: rgba(147, 51, 234, 0.4);
      text-shadow: 0 0 4px white;
    }
    .login-link {
      color: #d8b4fe;
      font-weight: 700;
      font-size: 1rem;
      background: linear-gradient(135deg, #7e22ce20, #ec489920);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid #c084fc40;
    }
    .login-link:hover {
      background: #7e22ce60;
      color: white;
      border-color: #f0a6ff;
      box-shadow: 0 0 12px #c084fc;
    }

    /* custom style cho mã giáo viên */
    #teacherCodeGroup .input-group i {
      color: #facc15;
    }

    /* scrollbar đẹp */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #03010f;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#a855f7, #ec4899);
      border-radius: 8px;
    }

    /* responsive */
    @media (max-width: 520px) {
      .register-body { padding: 28px 20px 38px; }
      .register-header h1 { font-size: 2rem; }
      .role-tab { font-size: 0.9rem; padding: 12px 8px; }
      .input-group input { padding: 14px 18px 14px 48px; font-size: 0.9rem; }
      .register-btn { font-size: 1rem; padding: 14px; }
    }

    /* hiệu ứng loading cho button */
    .register-btn:disabled {
      opacity: 0.7;
      transform: scale(0.98);
      cursor: not-allowed;
      filter: grayscale(0.1);
    }

    /* particle đẹp thêm cho container */
    .glow-ring {
      position: absolute;
      top: -20px;
      left: -20px;
      right: -20px;
      bottom: -20px;
      border-radius: 70px;
      background: radial-gradient(circle, rgba(147,51,234,0.2) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: -1;
      filter: blur(28px);
      opacity: 0.7;
    }
    .register-container {
      position: relative;
    }
    .register-container::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      padding: 2px;
      background: linear-gradient(125deg, #a855f7, #ec4899, #3b82f6);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.6;
      z-index: -1;
    }
  </style>
</head>
<body>

  <!-- VŨ TRỤ NỀN COSMIC -->
  <div class="cosmic-bg">
    <div class="stars-layer"></div>
    <div class="nebula-mist"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>

  <div class="register-container">
    <div class="glow-ring"></div>
    <div class="register-header">
      <h1>Quiz 9A</h1>
      <p><i class="fa-regular fa-star"></i> Hành tinh tri thức <i class="fa-regular fa-star"></i></p>
    </div>

    <div class="role-tabs">
      <div class="role-tab active" data-role="student" id="studentTab">
        <i class="fas fa-user-astronaut"></i> Học sinh
      </div>
      <div class="role-tab" data-role="teacher" id="teacherTab">
        <i class="fas fa-chalkboard-user"></i> Giáo viên
      </div>
    </div>

    <div class="register-body">
      <div id="errorAlert" class="alert error"></div>
      <div id="successAlert" class="alert success"></div>

      <form id="registerForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Tên đăng nhập vũ trụ" required />
        </div>

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Email liên hành tinh" required />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Mật khẩu (tối thiểu 6 ký tự)" required />
        </div>

        <div class="input-group" id="teacherCodeGroup" style="display: none;">
          <i class="fas fa-key"></i>
          <input type="text" id="teacherCode" placeholder="🔐 Mã kích hoạt Giáo viên (bí mật vũ trụ)" />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" required />
        </div>

        <button type="submit" class="register-btn" id="registerButton">
          <span id="btnText"><i class="fa-regular fa-gem"></i> Kích hoạt tàu không gian</span>
        </button>
      </form>

      <div class="links">
        <a href="trangchu.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại trung tâm vũ trụ</a>
        <a href="login.html" class="login-link"><i class="fa-regular fa-star"></i> Đã có thiên hà? Đăng nhập ngay <i class="fa-regular fa-star"></i></a>
      </div>
    </div>
  </div>

  <script>
    // === CẤU HÌNH MÃ GIÁO VIÊN (có thể sửa theo ý muốn) ===
    const TEACHER_ACTIVATION_CODE = "MAKICHHOATTKGIAOVIEN9211";   // mã kích hoạt bảo mật vũ trụ

    const form = document.getElementById('registerForm');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    const teacherCodeGroup = document.getElementById('teacherCodeGroup');
    const registerButton = document.getElementById('registerButton');
    const btnTextSpan = document.getElementById('btnText');

    let currentRole = 'student';

    // Xử lý tab role
    const studentTab = document.getElementById('studentTab');
    const teacherTab = document.getElementById('teacherTab');

    studentTab.addEventListener('click', () => {
      if (currentRole === 'student') return;
      currentRole = 'student';
      studentTab.classList.add('active');
      teacherTab.classList.remove('active');
      teacherCodeGroup.style.display = 'none';
      // xóa giá trị teacher code nếu có
      const teacherCodeInput = document.getElementById('teacherCode');
      if (teacherCodeInput) teacherCodeInput.value = '';
    });

    teacherTab.addEventListener('click', () => {
      if (currentRole === 'teacher') return;
      currentRole = 'teacher';
      teacherTab.classList.add('active');
      studentTab.classList.remove('active');
      teacherCodeGroup.style.display = 'block';
    });

    function showAlert(msg, type = 'error') {
      const alertEl = type === 'error' ? errorAlert : successAlert;
      alertEl.textContent = msg;
      alertEl.style.display = 'block';
      setTimeout(() => {
        alertEl.style.display = 'none';
      }, 5000);
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const teacherCode = document.getElementById('teacherCode') ? document.getElementById('teacherCode').value.trim() : '';

      // Validate cơ bản
      if (!username || !email || !password || !confirmPassword) {
        showAlert("❌ Vui lòng điền đầy đủ thông tin để thám hiểm không gian!");
        return;
      }
      if (password.length < 6) {
        showAlert("⚠️ Mật khẩu phải có ít nhất 6 ký tự để bảo vệ phi thuyền!");
        return;
      }
      if (password !== confirmPassword) {
        showAlert("🔁 Mật khẩu nhập lại không khớp với vũ trụ!");
        return;
      }
      // Email cơ bản kiểm tra
      if (!email.includes('@') || !email.includes('.')) {
        showAlert("📡 Email không hợp lệ, cần định dạng đúng để nhận tín hiệu!");
        return;
      }

      // Kiểm tra mã giáo viên nếu chọn vai trò Giáo viên
      if (currentRole === 'teacher') {
        if (!teacherCode) {
          showAlert("🔑 Vui lòng nhập mã kích hoạt Giáo viên (mã thiêng hà)!");
          return;
        }
        if (teacherCode !== TEACHER_ACTIVATION_CODE) {
          showAlert("🚫 Mã kích hoạt Giáo viên không chính xác! Hãy liên hệ quản trị vũ trụ.");
          return;
        }
      }

      let users = JSON.parse(localStorage.getItem('users')) || {};

      if (users[username]) {
        showAlert("👨‍🚀 Tên đăng nhập đã tồn tại trong dữ liệu thiên hà! Hãy chọn tên khác.");
        return;
      }

      // Tạo tài khoản mới
      btnTextSpan.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i> Đang kết nối hạ tầng vũ trụ...';
      registerButton.disabled = true;

      users[username] = {
        email: email,
        password: password,
        role: currentRole,
        createdAt: new Date().toISOString(),
        avatar: currentRole === 'teacher' ? '🚀👩‍🏫' : '🌠🧑‍🚀'
      };

      localStorage.setItem('users', JSON.stringify(users));

      setTimeout(() => {
        const roleMsg = currentRole === 'teacher' ? 'Giáo viên (Người dẫn lối)' : 'Học sinh (Chiến binh tri thức)';
        showAlert(`✨ Đăng ký thành công! Chào mừng ${username} - ${roleMsg} đến với vũ trụ Quiz 9A ✨`, 'success');
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1800);
      }, 800);
    });

    // thêm hiệu ứng phụ cho input focus tinh tế
    const allInputs = document.querySelectorAll('.input-group input');
    allInputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'translateY(-1px)';
      });
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = 'translateY(0)';
      });
    });
  </script>
