<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🐰 Game Nuôi Thỏ Sinh Động - Siêu Dễ Thương</title>
<style>
/* ===== BACKGROUND SIÊU XINH ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(#87CEEB 0%, #E0F7FA 45%, #A5D6A7 100%);
    height: 100vh;
    position: relative;
}

/* Mặt trời có tia sáng xoay */
.sun {
    position: absolute;
    top: 70px;
    right: 110px;
    width: 135px;
    height: 135px;
    background: radial-gradient(circle, #FFEB3B 25%, #FF9800 75%);
    border-radius: 50%;
    box-shadow: 0 0 75px #FFEB3B, 0 0 160px rgba(255,152,0,0.5);
    animation: sunPulse 5s infinite alternate;
    z-index: 2;
}
.sun::before {
    content: '';
    position: absolute;
    inset: -35px;
    background: conic-gradient(transparent, rgba(255,235,59,0.45), transparent);
    border-radius: 50%;
    animation: raySpin 18s linear infinite;
}
@keyframes sunPulse { from { transform: scale(1); } to { transform: scale(1.07); } }
@keyframes raySpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Nhiều mây bay */
.cloud {
    position: absolute;
    background: #fff;
    border-radius: 50px;
    box-shadow: 35px 12px 0 #fff, 70px 8px 0 #fff, 105px 18px 0 #fff;
    opacity: 0.95;
    z-index: 1;
}
.cloud1 { width: 190px; height: 68px; top: 65px; animation: moveCloud1 70s linear infinite; }
.cloud2 { width: 145px; height: 52px; top: 135px; animation: moveCloud2 48s linear infinite; }
.cloud3 { width: 220px; height: 72px; top: 40px; animation: moveCloud3 85s linear infinite; }
.cloud4 { width: 130px; height: 48px; top: 185px; animation: moveCloud4 52s linear infinite; }

@keyframes moveCloud1 { from { left: -260px; } to { left: 110%; } }
@keyframes moveCloud2 { from { left: -190px; } to { left: 110%; } }
@keyframes moveCloud3 { from { left: -310px; } to { left: 110%; } }
@keyframes moveCloud4 { from { left: -160px; } to { left: 110%; } }

/* Cỏ + hoa nền */
.grass {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 110px;
    background: linear-gradient(#66BB6A, #2E7D32);
    z-index: 4;
    overflow: hidden;
}
.grass::before {
    content: '🌼 🌸 🌼 🌺 🌼 🌸 🌼 🌺 🌼';
    position: absolute;
    bottom: 12px;
    width: 220%;
    font-size: 26px;
    animation: flowerWave 3.8s linear infinite;
    opacity: 0.85;
}

/* Hàng rào gỗ dễ thương */
.fence {
    position: absolute;
    bottom: 95px;
    width: 100%;
    height: 45px;
    background: repeating-linear-gradient(90deg, #8D6E63 0px, #8D6E63 30px, #A1887F 30px, #A1887F 55px);
    z-index: 5;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

/* ===== PANEL ĐẸP NHẤT ===== */
.panel {
    position: relative;
    z-index: 10;
    width: 490px;
    margin: 20px auto;
    padding: 32px;
    border-radius: 32px;
    background: rgba(255,255,255,0.32);
    backdrop-filter: blur(22px);
    box-shadow: 0 28px 65px rgba(0,0,0,0.38),
                inset 0 0 45px rgba(255,255,255,0.45);
    color: #1B3A2F;
    border: 1px solid rgba(255,255,255,0.6);
}

.panel h2 {
    text-align: center;
    font-size: 29px;
    margin: 0 0 26px;
    text-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* Label + icon */
.label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    margin: 15px 0 7px;
    font-size: 16px;
}

/* Slider siêu xinh */
input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 13px;
    border-radius: 999px;
    background: linear-gradient(to right, #FF9800, #F57C00);
    outline: none;
    box-shadow: inset 0 4px 10px rgba(0,0,0,0.25);
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 34px;
    height: 34px;
    background: #fff url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2219%22 font-size=%2220%22>🥕</text></svg>') center/24px no-repeat;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(245,124,0,0.6);
    border: 3px solid #F57C00;
}

/* Select đẹp */
select {
    width: 100%;
    padding: 13px 16px;
    border-radius: 16px;
    border: none;
    background: rgba(255,255,255,0.92);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    font-size: 16px;
    transition: 0.3s;
}
select:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(245,124,0,0.35); }

/* Health Bar */
.health-bar {
    height: 30px;
    background: #E0E0E0;
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 5px 14px rgba(0,0,0,0.3);
    margin: 20px 0 12px;
}
.health {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #FF4081, #FF80AB);
    transition: width 0.9s cubic-bezier(0.68,-0.55,0.27,1.55);
    position: relative;
}
.health::after {
    content: '❤️';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 19px;
    animation: heartBeat 1.1s infinite alternate;
}
@keyframes heartBeat { from { transform: scale(0.9) translateY(-50%); } to { transform: scale(1.15) translateY(-50%); } }

/* Khu vực thỏ - tăng chiều cao để chứa SVG lớn hơn */
.bunny-area {
    position: relative;
    height: 480px;
    margin: 15px auto;
    width: 340px;
    z-index: 6;
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* Shadow to đẹp hơn */
.shadow {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 230px;
    height: 42px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.38) 25%, transparent 75%);
    border-radius: 50%;
    z-index: 4;
}

/* Animation chung */
.wiggle { animation: earWiggle 2.2s ease-in-out infinite alternate; transform-origin: top; }
@keyframes earWiggle { from { transform: rotate(-12deg); } to { transform: rotate(12deg); } }

.hop { animation: bunnyHop 3s ease-in-out infinite alternate; }
@keyframes bunnyHop { from { transform: translateY(0); } to { transform: translateY(-18px); } }

.heart {
    position: absolute;
    font-size: 26px;
    color: #FF4081;
    animation: floatHeart 4s linear forwards;
    opacity: 0;
    z-index: 7;
}
@keyframes floatHeart {
    0%   { transform: translateY(0) scale(0.6); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(-220px) scale(1.2); opacity: 0; }
}

/* Status */
.status {
    text-align: center;
    font-size: 19px;
    font-weight: 700;
    padding: 12px;
    border-radius: 18px;
    margin-top: 8px;
    transition: 0.4s;
}

/* Nút hành động */
.action-btn {
    background: linear-gradient(#FF4081, #F50057);
    color: white;
    border: none;
    padding: 13px 24px;
    margin: 7px 5px;
    border-radius: 999px;
    font-weight: 700;
    box-shadow: 0 7px 18px rgba(245,0,87,0.4);
    cursor: pointer;
    transition: 0.3s;
}
.action-btn:hover { transform: scale(1.08) translateY(-3px); }
</style>

function getStage(days, health) {
    if (health <= 18) return "sad";
    
    if (days < 8) return "newborn";
    if (days < 21) return "baby";
    if (days < 41) return "juvenile";
    if (days < 66) return "young";
    
    // Ngày 66 trở lên
    if (health > 84) return "happyAdult";
    return "adult";
}

function drawBunny(stage) {
    document.getElementById("bunnyArea").innerHTML = bunnySVGs[stage];
}

// ========== LOGIC THÔNG MINH (giữ nguyên) ==========
let bonus = 0;

function calculateHealth() {
    let food = document.getElementById("food").value;
    let water = document.getElementById("water").value;
    let clean = document.getElementById("clean").value;
    let play = document.getElementById("play").value;
    let love = parseInt(document.getElementById("love").value);

    let health = 100 + bonus;

    if (food === "low") health -= 24;
    if (food === "high") health -= 18;
    if (water === "low") health -= 22;
    if (water === "high") health -= 26;
    if (clean === "medium") health -= 12;
    if (clean === "bad") health -= 30;
    if (play === "low") health -= 15;
    if (play === "none") health -= 28;

    health += Math.floor(love / 6);

    return Math.max(0, Math.min(100, health));
}

function updateAll() {
    let days = parseInt(document.getElementById("days").value);
    let health = calculateHealth();

    document.getElementById("dayValue").textContent = days;

    let stage = getStage(days, health);
    drawBunny(stage);

    const bar = document.getElementById("health");
    bar.style.width = health + "%";

    const status = document.getElementById("status");

    if (health > 82) {
        bar.style.background = "linear-gradient(90deg, #FF4081, #F50057)";
        status.innerHTML = "Thỏ siêu hạnh phúc! 🐰✨";
        status.style.background = "#FCE4EC";
        showHearts();
    } else if (health > 48) {
        bar.style.background = "linear-gradient(90deg, #FF9800, #F57C00)";
        status.innerHTML = "Thỏ vui vẻ 🐰";
        status.style.background = "#FFF3E0";
        hideHearts();
    } else {
        bar.style.background = "linear-gradient(90deg, #EF5350, #C62828)";
        status.innerHTML = "Thỏ buồn... 😢";
        status.style.background = "#FFEBEE";
        hideHearts();
    }
}

// Hiệu ứng trái tim bay
function showHearts() {
    const container = document.getElementById("hearts");
    container.innerHTML = `
        <div class="heart" style="left:38%; animation-delay:0s;">❤️</div>
        <div class="heart" style="left:52%; animation-delay:0.7s;">💗</div>
        <div class="heart" style="left:65%; animation-delay:1.4s;">❤️</div>
        <div class="heart" style="left:45%; animation-delay:2.2s;">💗</div>
    `;
}
function hideHearts() {
    document.getElementById("hearts").innerHTML = '';
}

// Hành động đặc biệt
function feedBunny() { bonus = Math.min(28, bonus + 19); updateAll(); }
function giveWater() { bonus = Math.min(25, bonus + 16); updateAll(); }
function cleanCage() { bonus = Math.min(22, bonus + 14); updateAll(); }
function petBunny() { 
    let loveSlider = document.getElementById("love");
    loveSlider.value = Math.min(100, parseInt(loveSlider.value) + 22);
    bonus = Math.min(30, bonus + 12);
    updateAll();
}
function nextDay() {
    let daysSlider = document.getElementById("days");
    daysSlider.value = Math.min(120, parseInt(daysSlider.value) + 1);
    bonus = Math.max(0, bonus - 4);
    updateAll();
}

// Khởi chạy
updateAll();
</script>
