<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Giáo viên · Creative Quiz</title>
  <link rel="stylesheet" href="csss.css" />
  <script src="shared-data.js"></script>
  <style>
    /* ===== RESET & FONTS ===== */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0b1f;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0f2fe;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle 900px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(103,232,249,0.12), transparent 65%);
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
    }
    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .neon-cursor {
      position: fixed;
      width: 38px; height: 38px;
      border: 2px solid #67e8f9;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 25px #67e8f9, 0 0 55px #c026d3;
      mix-blend-mode: difference;
      display: none;
    }
    .neon-cursor::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #67e8f9;
    }
    @media (min-width: 768px) { .neon-cursor { display: block; } }

    .app {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(8, 20, 40, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(103, 232, 249, 0.15);
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-left h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #67e8f9, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-left .sub {
      font-size: 0.8rem;
      color: #7ba8c8;
      font-family: monospace;
      background: rgba(103,232,249,0.08);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(103,232,249,0.1);
    }
    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 22px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(255,255,255,0.05);
      color: #e0f2fe;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn:hover { transform: scale(1.03); }
    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #67e8f9);
      color: #04080f;
      border: none;
    }
    .btn-primary:hover { box-shadow: 0 4px 24px rgba(56,189,248,0.3); }
    .btn-danger {
      background: linear-gradient(135deg, #f87171, #ef4444);
      color: #fff;
      border: none;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(103,232,249,0.3);
      color: #67e8f9;
    }
    .btn-outline:hover { background: rgba(103,232,249,0.06); }

    /* ===== DASHBOARD CARDS ===== */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 30px;
    }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(103,232,249,0.15);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }
    .card:hover { border-color: rgba(103,232,249,0.35); }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e0f2fe;
    }
    .card-title .badge {
      background: rgba(103,232,249,0.12);
      border: 1px solid rgba(103,232,249,0.15);
      border-radius: 999px;
      padding: 2px 12px;
      font-size: 0.7rem;
      font-weight: 400;
      color: #67e8f9;
      font-family: monospace;
    }

    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: #3a6080;
      font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 8px; }

    /* ===== CLASS LIST ===== */
    .class-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(103,232,249,0.06);
      margin-bottom: 8px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .class-item:hover { background: rgba(103,232,249,0.04); }
    .class-item .info { display: flex; flex-direction: column; gap: 2px; }
    .class-item .info .name { font-weight: 600; color: #e0f2fe; }
    .class-item .info .meta { font-size: 0.75rem; color: #7ba8c8; font-family: monospace; }
    .class-item .actions { display: flex; gap: 8px; }
    .class-item .actions .btn-sm {
      padding: 4px 12px;
      font-size: 0.7rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: #7ba8c8;
      transition: all 0.2s;
    }
    .class-item .actions .btn-sm:hover { background: rgba(103,232,249,0.1); color: #e0f2fe; }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #3a6080;
      font-family: monospace;
      margin-bottom: 4px;
    }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: #0d1726;
      border: 1px solid rgba(103,232,249,0.15);
      border-radius: 12px;
      color: #e0f2fe;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-control:focus { border-color: #67e8f9; }
    .form-control::placeholder { color: #3a6080; }
    textarea.form-control { min-height: 80px; resize: vertical; }
    select.form-control { appearance: none; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) { .row-2 { grid-template-columns: 1fr; } }

    /* ===== QUESTION BUILDER ===== */
    .question-block {
      background: rgba(13,23,38,0.6);
      border: 1px solid rgba(103,232,249,0.08);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-block .q-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .question-block .q-header .q-num {
      font-weight: 700;
      color: #67e8f9;
      font-family: monospace;
    }
    .question-block .q-header .q-remove {
      background: none;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .question-block .q-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .question-block .q-options .opt-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .question-block .q-options .opt-input input[type="radio"] {
      accent-color: #67e8f9;
      width: 16px;
      height: 16px;
    }
    .question-block .q-options .opt-input input[type="text"] {
      flex: 1;
      background: #0b0b1f;
      border: 1px solid rgba(103,232,249,0.1);
      border-radius: 8px;
      padding: 6px 10px;
      color: #e0f2fe;
      font-size: 0.85rem;
      outline: none;
    }
    .question-block .q-options .opt-input input[type="text"]:focus { border-color: #67e8f9; }

    .btn-add-q {
      width: 100%;
      padding: 12px;
      border: 1px dashed rgba(103,232,249,0.2);
      border-radius: 12px;
      background: transparent;
      color: #7ba8c8;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-add-q:hover { border-color: #67e8f9; color: #e0f2fe; background: rgba(103,232,249,0.03); }

    /* ===== MODAL ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: #080f1a;
      border: 1px solid rgba(103,232,249,0.3);
      border-radius: 20px;
      padding: 32px;
      width: 700px;
      max-width: 96vw;
      max-height: 92vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }
    .modal-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #e0f2fe;
    }
    .modal-close {
      margin-left: auto;
      background: rgba(255,255,255,0.06);
      border: none;
      color: #7ba8c8;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { color: #e0f2fe; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #080f1a;
      border: 1px solid rgba(103,232,249,0.3);
      border-radius: 14px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 4000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      min-width: 260px;
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-icon { font-size: 1.5rem; }
    .toast-title { font-size: 0.95rem; font-weight: 700; color: #e0f2fe; }
    .toast-sub { font-size: 0.75rem; color: #3a6080; font-family: monospace; }

    /* ===== SCROLL ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b0b1f; }
    ::-webkit-scrollbar-thumb { background: #3a6080; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #67e8f9; }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <div class="neon-cursor" id="neonCursor"></div>

  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <h1>🧑‍🏫 Giáo viên</h1>
        <span class="sub" id="teacherName">Chưa đăng nhập</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openCreateClass()">➕ Tạo lớp</button>
        <button class="btn btn-outline" onclick="window.location.href='trangchu.html'">🏠 Về trang chủ</button>
        <button class="btn btn-danger" onclick="logoutTeacher()">🚪 Đăng xuất</button>
      </div>
    </header>

    <!-- GRID CHÍNH -->
    <div class="grid-2">
      <!-- Cột trái: Danh sách lớp -->
      <div class="card">
        <div class="card-title">
          📚 Lớp của tôi
          <span class="badge" id="classCount">0</span>
        </div>
        <div id="classList">
          <div class="empty-state">
            <div class="icon">🏫</div>
            <p>Chưa có lớp học nào.<br>Bấm "Tạo lớp" để bắt đầu.</p>
          </div>
        </div>
      </div>

      <!-- Cột phải: Bài tập gần đây & thống kê nhanh -->
      <div class="card">
        <div class="card-title">
          📝 Bài tập gần đây
          <span class="badge" id="assignCount">0</span>
        </div>
        <div id="recentAssigns">
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>Chưa có bài tập nào được tạo.</p>
          </div>
        </div>
        <div style="margin-top: 18px; border-top: 1px solid rgba(103,232,249,0.06); padding-top: 16px;">
          <button class="btn btn-primary" style="width:100%;" onclick="openCreateAssign()">✏️ Tạo bài tập mới</button>
        </div>
      </div>
    </div>

    <!-- Khu vực chi tiết lớp (hiển thị khi chọn lớp) -->
    <div class="card" id="classDetail" style="display:none; margin-top: 20px;">
      <div class="card-title" id="detailTitle">📖 Lớp: <span id="detailClassName">—</span></div>
      <div style="display:flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px;">
        <button class="btn btn-sm btn-outline" onclick="loadClassDetail()">🔄 Làm mới</button>
        <button class="btn btn-sm btn-outline" onclick="openCreateAssign()">➕ Thêm bài tập</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSelectedClass()">🗑️ Xóa lớp</button>
      </div>
      <div id="detailContent">
        <div class="empty-state">Chọn một lớp bên trái để xem chi tiết.</div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL TẠO LỚP ===== -->
  <div class="overlay" id="createClassOverlay" onclick="if(event.target===this)closeModal('createClassOverlay')">
    <div class="modal">
      <div class="modal-title">
        🏫 Tạo lớp mới
        <button class="modal-close" onclick="closeModal('createClassOverlay')">✕</button>
      </div>
      <div class="form-group">
        <label>Tên lớp</label>
        <input class="form-control" id="classNameInput" placeholder="VD: Lớp 9A - KHTN" />
      </div>
      <div class="form-group">
        <label>Mã lớp (6 ký tự, tự động sinh nếu để trống)</label>
        <input class="form-control" id="classCodeInput" placeholder="Để trống để tự tạo" maxlength="6" style="text-transform:uppercase;font-family:monospace;letter-spacing:4px;text-align:center;" />
      </div>
      <div class="form-group">
        <label>Mô tả (không bắt buộc)</label>
        <input class="form-control" id="classDescInput" placeholder="Môn học, khối lớp, ..." />
      </div>
      <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="createClass()">✅ Tạo lớp</button>
    </div>
  </div>

  <!-- ===== MODAL TẠO BÀI TẬP ===== -->
  <div class="overlay" id="createAssignOverlay" onclick="if(event.target===this)closeModal('createAssignOverlay')">
    <div class="modal" style="width:800px;">
      <div class="modal-title">
        ✏️ Tạo bài tập mới
        <button class="modal-close" onclick="closeModal('createAssignOverlay')">✕</button>
      </div>
      <div class="form-group">
        <label>Chọn lớp</label>
        <select class="form-control" id="assignClassSelect"></select>
      </div>
      <div class="row-2">
        <div class="form-group">
          <label>Tiêu đề bài tập</label>
          <input class="form-control" id="assignTitle" placeholder="VD: Ôn tập chương 1" />
        </div>
        <div class="form-group">
          <label>Môn học</label>
          <select class="form-control" id="assignSubject">
            <option value="KHTN">Khoa học tự nhiên</option>
            <option value="Vật Lý">Vật Lý</option>
            <option value="Hóa Học">Hóa Học</option>
            <option value="Sinh Học">Sinh Học</option>
            <option value="Toán">Toán</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Mô tả</label>
        <input class="form-control" id="assignDesc" placeholder="Nội dung ngắn gọn về bài tập" />
      </div>
      <div class="form-group">
        <label>Hạn nộp (không bắt buộc)</label>
        <input class="form-control" id="assignDue" type="datetime-local" />
      </div>

      <hr style="border-color:rgba(103,232,249,0.08); margin: 16px 0;" />

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span style="font-weight:700;">📋 Câu hỏi</span>
        <div>
          <button class="btn btn-sm btn-outline" onclick="addQuestion('mc')">➕ Trắc nghiệm</button>
          <button class="btn btn-sm btn-outline" onclick="addQuestion('essay')">➕ Tự luận</button>
        </div>
      </div>
      <div id="questionContainer"></div>

      <button class="btn btn-primary" style="width:100%;padding:14px;margin-top:12px;" onclick="saveAssignment()">💾 Lưu bài tập</button>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">✅</span>
    <div>
      <div class="toast-title" id="toastTitle">—</div>
      <div class="toast-sub" id="toastSub">—</div>
    </div>
  </div>

  <script>
    // ================================================================
    // 1. STORAGE HELPERS (dùng chung với shared-data.js)
    // ================================================================
    async function sdGet(key, shared = false) {
      try {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : null;
      } catch(e) { return null; }
    }
    async function sdSet(key, value, shared = false) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch(e) {}
    }

    // ================================================================
    // 2. PROFILE & AUTH
    // ================================================================
    function getStudentProfile() {
      try {
        const raw = localStorage.getItem('studentProfile');
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return null;
    }

    function getTeacherProfile() {
      // Dùng chung profile, nhưng yêu cầu role = 'teacher'
      const p = getStudentProfile();
      if (p && p.role === 'teacher') return p;
      return null;
    }

    function updateTeacherUI() {
      const p = getStudentProfile();
      const nameEl = document.getElementById('teacherName');
      if (p && p.username) {
        nameEl.textContent = p.displayName || p.username;
      } else {
        nameEl.textContent = 'Chưa đăng nhập';
      }
    }

    function logoutTeacher() {
      if (confirm('Bạn có chắc muốn đăng xuất?')) {
        // Không xóa profile, chỉ chuyển về trang chủ
        window.location.href = 'trangchu.html';
      }
    }

    // Kiểm tra quyền: nếu không có profile hoặc không phải giáo viên, chuyển hướng
    (function checkAuth() {
      const p = getStudentProfile();
      if (!p || p.role !== 'teacher') {
        alert('Bạn cần đăng nhập với tài khoản giáo viên để vào trang này.');
        window.location.href = 'trangchu.html';
      }
    })();

    // ================================================================
    // 3. QUẢN LÝ LỚP HỌC
    // ================================================================
    let myClasses = []; // [{code, name, desc, teacher, createdAt}]
    let selectedClassCode = null;

    async function loadClasses() {
      const p = getStudentProfile();
      if (!p) return;
      const teacher = p.username;
      const all = await sdGet('teacher-classes') || [];
      myClasses = all.filter(c => c.teacher === teacher);
      renderClassList();
      document.getElementById('classCount').textContent = myClasses.length;
      if (selectedClassCode && myClasses.some(c => c.code === selectedClassCode)) {
        loadClassDetail(selectedClassCode);
      } else {
        // Nếu lớp đã chọn bị xóa, clear chi tiết
        if (selectedClassCode) {
          selectedClassCode = null;
          document.getElementById('classDetail').style.display = 'none';
        }
      }
    }

    function renderClassList() {
      const container = document.getElementById('classList');
      if (myClasses.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🏫</div><p>Chưa có lớp học nào.<br>Bấm "Tạo lớp" để bắt đầu.</p></div>`;
        return;
      }
      container.innerHTML = myClasses.map(c => `
        <div class="class-item" onclick="selectClass('${c.code}')">
          <div class="info">
            <div class="name">${c.name}</div>
            <div class="meta">${c.code} • ${c.desc || 'Không mô tả'} • ${new Date(c.createdAt).toLocaleDateString()}</div>
          </div>
          <div class="actions">
            <button class="btn-sm" onclick="event.stopPropagation();selectClass('${c.code}')">📖 Xem</button>
            <button class="btn-sm" onclick="event.stopPropagation();deleteClass('${c.code}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function selectClass(code) {
      selectedClassCode = code;
      loadClassDetail(code);
    }

    async function loadClassDetail(code) {
      if (!code) code = selectedClassCode;
      if (!code) return;
      const classData = myClasses.find(c => c.code === code);
      if (!classData) {
        document.getElementById('classDetail').style.display = 'none';
        return;
      }
      document.getElementById('classDetail').style.display = 'block';
      document.getElementById('detailClassName').textContent = classData.name;

      // Lấy học sinh
      const students = await sdGet('students-' + code) || [];
      // Lấy bài tập
      const assignments = await sdGet('assignments-' + code) || [];
      // Lấy bài nộp
      const submits = await sdGet('submits-' + code) || [];

      let html = `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:16px;">
          <div style="background:rgba(255,255,255,0.02); border-radius:12px; padding:16px;">
            <div style="font-weight:600; color:#67e8f9;">👨‍🎓 Học sinh (${students.length})</div>
            ${students.length === 0 ? '<div style="color:#3a6080;font-size:0.85rem;margin-top:8px;">Chưa có học sinh tham gia.</div>' :
              students.map(s => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
                <span>${s.name}</span>
                <span style="color:#7ba8c8;font-size:0.75rem;font-family:monospace;">${s.username}</span>
              </div>`).join('')}
          </div>
          <div style="background:rgba(255,255,255,0.02); border-radius:12px; padding:16px;">
            <div style="font-weight:600; color:#67e8f9;">📝 Bài tập (${assignments.length})</div>
            ${assignments.length === 0 ? '<div style="color:#3a6080;font-size:0.85rem;margin-top:8px;">Chưa có bài tập nào.</div>' :
              assignments.map(a => {
                const done = submits.filter(s => s.assignId === a.id).length;
                return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
                  <span>${a.title}</span>
                  <span style="color:#7ba8c8;font-size:0.75rem;">${done} đã nộp</span>
                </div>`;
              }).join('')}
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.02); border-radius:12px; padding:16px;">
          <div style="font-weight:600; color:#67e8f9;">📥 Bài nộp gần đây</div>
          ${submits.length === 0 ? '<div style="color:#3a6080;font-size:0.85rem;margin-top:8px;">Chưa có bài nộp.</div>' :
            submits.slice(-5).reverse().map(s => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
              <span>${s.studentName} - ${s.assignTitle}</span>
              <span style="color:#7ba8c8;font-size:0.7rem;font-family:monospace;">${new Date(s.submittedAt).toLocaleString()}</span>
            </div>`).join('')}
        </div>
      `;
      document.getElementById('detailContent').innerHTML = html;
    }

    async function createClass() {
      const name = document.getElementById('classNameInput').value.trim();
      let code = document.getElementById('classCodeInput').value.trim().toUpperCase();
      const desc = document.getElementById('classDescInput').value.trim();
      if (!name) { showToast('⚠️', 'Vui lòng nhập tên lớp.'); return; }
      if (code && code.length !== 6) { showToast('⚠️', 'Mã lớp phải đúng 6 ký tự.'); return; }
      if (!code) {
        // Tự sinh mã: 6 ký tự ngẫu nhiên (A-Z, 0-9)
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let newCode;
        let exists = true;
        while (exists) {
          newCode = '';
          for (let i = 0; i < 6; i++) newCode += chars[Math.floor(Math.random() * chars.length)];
          const all = await sdGet('teacher-classes') || [];
          exists = all.some(c => c.code === newCode);
        }
        code = newCode;
      }

      const p = getStudentProfile();
      if (!p) { showToast('❌', 'Bạn chưa đăng nhập.'); return; }

      const newClass = {
        code,
        name,
        desc: desc || '',
        teacher: p.username,
        createdAt: Date.now()
      };

      let all = await sdGet('teacher-classes') || [];
      if (all.some(c => c.code === code)) {
        showToast('⚠️', 'Mã lớp đã tồn tại!', 'Vui lòng chọn mã khác.');
        return;
      }
      all.push(newClass);
      await sdSet('teacher-classes', all);
      showToast('🎉', `Lớp "${name}" đã được tạo!`, `Mã: ${code}`);
      closeModal('createClassOverlay');
      document.getElementById('classNameInput').value = '';
      document.getElementById('classCodeInput').value = '';
      document.getElementById('classDescInput').value = '';
      await loadClasses();
    }

    async function deleteClass(code) {
      if (!confirm(`Bạn có chắc muốn xóa lớp này? (Mã: ${code})`)) return;
      let all = await sdGet('teacher-classes') || [];
      all = all.filter(c => c.code !== code);
      await sdSet('teacher-classes', all);
      // Xóa dữ liệu liên quan
      localStorage.removeItem('students-' + code);
      localStorage.removeItem('assignments-' + code);
      localStorage.removeItem('submits-' + code);
      localStorage.removeItem('assign-personal-' + code);
      if (selectedClassCode === code) {
        selectedClassCode = null;
        document.getElementById('classDetail').style.display = 'none';
      }
      await loadClasses();
      showToast('🗑️', 'Đã xóa lớp.', '');
    }

    function deleteSelectedClass() {
      if (selectedClassCode) deleteClass(selectedClassCode);
    }

    // ================================================================
    // 4. QUẢN LÝ BÀI TẬP
    // ================================================================
    let questions = [];
    let editingQuestionIndex = -1;

    function openCreateAssign() {
      // Populate class select
      const select = document.getElementById('assignClassSelect');
      select.innerHTML = '';
      if (myClasses.length === 0) {
        select.innerHTML = '<option value="">— Chưa có lớp —</option>';
        showToast('⚠️', 'Bạn cần tạo lớp trước khi tạo bài tập.');
        return;
      }
      myClasses.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.code;
        opt.textContent = `${c.name} (${c.code})`;
        select.appendChild(opt);
      });
      // Reset form
      document.getElementById('assignTitle').value = '';
      document.getElementById('assignSubject').value = 'KHTN';
      document.getElementById('assignDesc').value = '';
      document.getElementById('assignDue').value = '';
      questions = [];
      renderQuestions();
      document.getElementById('createAssignOverlay').classList.add('open');
    }

    function addQuestion(type) {
      questions.push({
        type: type, // 'mc' hoặc 'essay'
        question: '',
        options: ['', '', '', ''],
        correct: 0, // index 0-3
        explain: '',
        modelAnswer: ''
      });
      renderQuestions();
    }

    function removeQuestion(index) {
      questions.splice(index, 1);
      renderQuestions();
    }

    function renderQuestions() {
      const container = document.getElementById('questionContainer');
      if (questions.length === 0) {
        container.innerHTML = `<div class="empty-state" style="padding:20px 0;"><p>Chưa có câu hỏi nào. Hãy thêm câu hỏi trắc nghiệm hoặc tự luận.</p></div>`;
        return;
      }
      container.innerHTML = questions.map((q, idx) => {
        if (q.type === 'mc') {
          return `
            <div class="question-block">
              <div class="q-header">
                <span class="q-num">Câu ${idx+1} (Trắc nghiệm)</span>
                <button class="q-remove" onclick="removeQuestion(${idx})">✕</button>
              </div>
              <div class="form-group">
                <input class="form-control" style="font-weight:600;" placeholder="Nhập câu hỏi..." value="${q.question}" oninput="updateQuestion(${idx}, 'question', this.value)" />
              </div>
              <div class="q-options">
                ${q.options.map((opt, oi) => `
                  <div class="opt-input">
                    <input type="radio" name="correct_${idx}" value="${oi}" ${q.correct === oi ? 'checked' : ''} onchange="updateQuestion(${idx}, 'correct', ${oi})" />
                    <input type="text" placeholder="Đáp án ${String.fromCharCode(65+oi)}" value="${opt}" oninput="updateQuestion(${idx}, 'options', this.value, ${oi})" />
                  </div>
                `).join('')}
              </div>
              <div class="form-group" style="margin-top:10px;">
                <input class="form-control" placeholder="Giải thích (không bắt buộc)" value="${q.explain || ''}" oninput="updateQuestion(${idx}, 'explain', this.value)" />
              </div>
            </div>
          `;
        } else {
          return `
            <div class="question-block">
              <div class="q-header">
                <span class="q-num">Câu ${idx+1} (Tự luận)</span>
                <button class="q-remove" onclick="removeQuestion(${idx})">✕</button>
              </div>
              <div class="form-group">
                <input class="form-control" style="font-weight:600;" placeholder="Nhập câu hỏi tự luận..." value="${q.question}" oninput="updateQuestion(${idx}, 'question', this.value)" />
              </div>
              <div class="form-group">
                <input class="form-control" placeholder="Đáp án mẫu (gợi ý)" value="${q.modelAnswer || ''}" oninput="updateQuestion(${idx}, 'modelAnswer', this.value)" />
              </div>
            </div>
          `;
        }
      }).join('');
    }

    function updateQuestion(idx, field, value, subIdx) {
      if (field === 'options') {
        questions[idx].options[subIdx] = value;
      } else if (field === 'correct') {
        questions[idx].correct = value;
      } else {
        questions[idx][field] = value;
      }
    }

    async function saveAssignment() {
      const classCode = document.getElementById('assignClassSelect').value;
      const title = document.getElementById('assignTitle').value.trim();
      const subject = document.getElementById('assignSubject').value;
      const desc = document.getElementById('assignDesc').value.trim();
      const due = document.getElementById('assignDue').value;

      if (!classCode) { showToast('⚠️', 'Chọn lớp trước khi lưu.'); return; }
      if (!title) { showToast('⚠️', 'Nhập tiêu đề bài tập.'); return; }
      if (questions.length === 0) { showToast('⚠️', 'Thêm ít nhất một câu hỏi.'); return; }

      // Validate MC questions
      for (let q of questions) {
        if (q.type === 'mc') {
          if (!q.question.trim()) { showToast('⚠️', 'Câu hỏi trắc nghiệm không được để trống.'); return; }
          if (q.options.some(o => !o.trim())) { showToast('⚠️', 'Tất cả đáp án cần được điền.'); return; }
          if (q.correct < 0 || q.correct > 3) { showToast('⚠️', 'Chọn đáp án đúng cho câu hỏi trắc nghiệm.'); return; }
        } else {
          if (!q.question.trim()) { showToast('⚠️', 'Câu hỏi tự luận không được để trống.'); return; }
        }
      }

      const assignId = Date.now() + Math.floor(Math.random() * 1000);
      const newAssign = {
        id: assignId,
        title,
        subject,
        desc,
        due: due || null,
        createdAt: Date.now(),
        questions: questions.map(q => ({ ...q }))
      };

      let assigns = await sdGet('assignments-' + classCode) || [];
      assigns.push(newAssign);
      await sdSet('assignments-' + classCode, assigns);

      showToast('✅', 'Bài tập đã được lưu!', `Lớp: ${classCode}`);
      closeModal('createAssignOverlay');
      // Load lại chi tiết lớp nếu đang xem
      if (selectedClassCode === classCode) {
        loadClassDetail(classCode);
      }
      // Cập nhật danh sách bài tập gần đây
      renderRecentAssigns();
    }

    // ================================================================
    // 5. HIỂN THỊ BÀI TẬP GẦN ĐÂY
    // ================================================================
    async function renderRecentAssigns() {
      let allAssigns = [];
      for (let c of myClasses) {
        const assigns = await sdGet('assignments-' + c.code) || [];
        allAssigns = allAssigns.concat(assigns.map(a => ({ ...a, className: c.name, classCode: c.code })));
      }
      allAssigns.sort((a, b) => b.createdAt - a.createdAt);
      const recent = allAssigns.slice(0, 5);
      const container = document.getElementById('recentAssigns');
      document.getElementById('assignCount').textContent = allAssigns.length;
      if (recent.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Chưa có bài tập nào.</p></div>`;
        return;
      }
      container.innerHTML = recent.map(a => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <div>
            <div style="font-weight:600;">${a.title}</div>
            <div style="font-size:0.75rem;color:#7ba8c8;">${a.className} • ${a.subject}</div>
          </div>
          <div style="font-size:0.7rem;color:#3a6080;font-family:monospace;">${new Date(a.createdAt).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

    // ================================================================
    // 6. UTILITY
    // ================================================================
    function openCreateClass() {
      document.getElementById('createClassOverlay').classList.add('open');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    function showToast(icon, title, sub = '') {
      const t = document.getElementById('toast');
      document.getElementById('toastIcon').textContent = icon;
      document.getElementById('toastTitle').textContent = title;
      document.getElementById('toastSub').textContent = sub || '';
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ================================================================
    // 7. PARTICLE BACKGROUND
    // ================================================================
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    });

    const mouse = { x: w/2, y: h/2 };
    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
      document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
      document.getElementById('neonCursor').style.left = e.clientX + 'px';
      document.getElementById('neonCursor').style.top = e.clientY + 'px';
    });

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 2.2 + 0.8;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 170 && dist > 0) {
          const force = (170 - dist) / 170;
          this.speedX += (dx / dist) * force * 1.8;
          this.speedY += (dy / dist) * force * 1.8;
        }
        this.speedX *= 0.975; this.speedY *= 0.975;
        if (this.x < 0 || this.x > w) this.speedX *= -1;
        if (this.y < 0 || this.y > h) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = 'rgba(103, 232, 249, 0.92)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    let particles = [];
    for (let i = 0; i < 130; i++) particles.push(new Particle());

    function animate() {
      ctx.fillStyle = 'rgba(11, 11, 31, 0.15)';
      ctx.fillRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    // ================================================================
    // 8. INIT
    // ================================================================
    updateTeacherUI();
    loadClasses();
    renderRecentAssigns();

    // Nếu có tham số ?class=code trên URL, tự động chọn lớp đó
    const urlParams = new URLSearchParams(window.location.search);
    const classParam = urlParams.get('class');
    if (classParam) {
      setTimeout(() => {
        if (myClasses.some(c => c.code === classParam)) {
          selectClass(classParam);
        }
      }, 500);
    }
  </script>
</body>
